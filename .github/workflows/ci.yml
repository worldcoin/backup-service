name: CI

on:
  push:
    branches: [main]
  pull_request:

# Unless we are on the main branch, the workflow should stop and yield to a new run if new code is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }} # allow concurrency on main by setting the concurrency group to the commit hash
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }} # Code pushed to PRs will cancel previous workflows, while all code pushed to the main branch will trigger a new workflow

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  lint:
    name: Format & Clippy
    runs-on:
      group: arc-public-large-amd64-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # 2026-06-30
        with:
          toolchain: stable

      - name: Get Rust version
        id: rust_version
        run: echo "version=$(rustc --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Check code formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-features

  build-release:
    name: Build Release
    runs-on:
      group: arc-public-large-amd64-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # 2026-06-30
        with:
          toolchain: stable

      - name: Build the project
        run: cargo build --release --locked

  test:
    name: Tests
    runs-on:
      group: arc-public-4xlarge-amd64-runner

    # Log in to Docker Hub if a token is provided to avoid public rate limiting
    env:
      IS_DOCKER_TOKEN_SET: ${{ (secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_TOKEN != '' && secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_USERNAME != '') && 'true' || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # 2026-06-30
        with:
          toolchain: stable

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0 https://github.com/docker/login-action/releases/tag/v4.4.0
        if: ${{ env.IS_DOCKER_TOKEN_SET == 'true' }}
        with:
          username: ${{ secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_TOKEN }}

      - name: Start LocalStack
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          docker compose up -d
          # Wait for services to be ready
          sleep 20
          docker compose logs

      - name: Health check LocalStack
        run: curl -s http://localhost:4566/_localstack/health | jq -e '.services.s3 == "running"'

      - name: Run tests
        run: cargo test -- --nocapture

      - name: Clean up
        run: docker compose down

  docker:
    name: Test Docker build
    runs-on:
      group: arc-public-4xlarge-amd64-runner
    permissions:
      contents: read

    env:
      IS_DOCKER_TOKEN_SET: ${{ (secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_TOKEN != '' && secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_USERNAME != '') && 'true' || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0 https://github.com/docker/login-action/releases/tag/v4.4.0
        if: ${{ env.IS_DOCKER_TOKEN_SET == 'true' }}
        with:
          username: ${{ secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.2.0

      - name: Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0 https://github.com/docker/build-push-action/releases/tag/v7.3.0
        id: docker_build
        with:
          push: false
          load: true
          tags: backup-service-ci:latest
          cache-from: type=gha
          cache-to: "type=gha,mode=max,ignore-error=true"
          platforms: linux/amd64

      - name: Start LocalStack
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          docker compose up -d

      - name: Run Docker container
        run: |
          docker run -d --network host --env-file .env.example --name backup-service-ci-container backup-service-ci:latest

          # Wait for the application to start
          sleep 10

          # Output logs to GitHub action
          docker logs backup-service-ci-container

      - name: Health check Docker container
        run: curl -f http://0.0.0.0:8000/health

      - name: Clean up
        run: |
          docker stop backup-service-ci-container
          docker rm backup-service-ci-container
          docker compose down

  deny:
    name: Cargo deny
    runs-on:
      group: arc-public-large-amd64-runner

    env:
      IS_DOCKER_TOKEN_SET: ${{ (secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_TOKEN != '' && secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_USERNAME != '') && 'true' || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0 https://github.com/docker/login-action/releases/tag/v4.4.0
        if: ${{ env.IS_DOCKER_TOKEN_SET == 'true' }}
        with:
          username: ${{ secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PULL_PUBLIC_IMAGES_TOKEN }}

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # 2026-06-30
        with:
          toolchain: stable

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20 https://github.com/EmbarkStudios/cargo-deny-action/releases/tag/v2.0.20
        with:
          command: check
